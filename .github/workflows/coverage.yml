name: Coverage

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'

# Note on scope: this workflow measures the C++ library (gcov) and the Python
# wrapper layer (pytest-cov). The `coverage` job runs a serial and an
# MPI-enabled build on CPU runners so MPI-only code (e.g. fft/transpose.cc, the
# cartesian communicator/decomposition) is exercised rather than reported as a
# false 0%. The `coverage-gpu` job runs on the GPU-equipped runner and measures
# the host-side CUDA dispatch code. All legs upload to Codecov, which merges
# them. The only remaining gap is CUDA __global__ kernel bodies, which gcov
# (host-only) cannot instrument.

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        mpi: ['no', 'yes']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update -qy
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip
          # gcovr turns the raw .gcda data into reports; pytest-cov measures the
          # Python wrapper layer.
          python3 -m pip install "numpy>=2.1" pytest pytest-cov gcovr \
            "NuMPI[test]" netCDF4 muTimer
          if [ "${{ matrix.mpi }}" == "yes" ]; then
            sudo apt-get install -y \
              cmake \
              ninja-build \
              libboost-test-dev \
              openmpi-bin \
              libopenmpi-dev \
              libpnetcdf-dev \
              libnetcdf-dev
            CC=mpicc python3 -m pip install -v --no-binary mpi4py "mpi4py==4.0.3"
          else
            sudo apt-get install -y \
              cmake \
              ninja-build \
              libboost-test-dev \
              libnetcdf-dev
          fi

      - name: Configure (coverage-instrumented, Debug)
        run: |
          source venv/bin/activate
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMUGRID_ENABLE_COVERAGE=ON \
            -DMUGRID_ENABLE_MPI=${{ matrix.mpi == 'yes' && 'ON' || 'OFF' }} \
            -DMUGRID_ENABLE_NETCDF=ON \
            -DMUGRID_ENABLE_PYTHON=ON \
            -DMUGRID_ENABLE_TESTS=ON \
            -DMUGRID_ENABLE_EXAMPLES=OFF \
            -DPython_EXECUTABLE=$(which python3)

      - name: Build
        run: |
          source venv/bin/activate
          cmake --build build

      - name: Run test suite (populates coverage counters)
        run: |
          source venv/bin/activate
          ctest --test-dir build --output-on-failure

      - name: Generate C++ coverage reports
        run: |
          source venv/bin/activate
          cmake --build build --target coverage

      - name: Python wrapper-layer coverage
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          export TESTS_BUILDDIR=$PWD/build/tests
          # -v -rA makes every test's outcome (passed/skipped, with reasons)
          # visible in the log, so it can be audited which tests actually ran.
          python3 -m pytest tests -v -rA \
            --cov=muGrid --cov-report=xml:build/coverage-python.xml \
            --cov-report=term-missing || true

      - name: Upload coverage reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-mpi-${{ matrix.mpi }}
          path: |
            build/coverage.xml
            build/coverage-python.xml
            build/coverage_html/
          if-no-files-found: warn

      # Best-effort upload to Codecov. Codecov merges the serial and MPI legs
      # into a single report. Does not fail the job if Codecov is not
      # configured for this repository.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.xml,build/coverage-python.xml
          flags: mpi-${{ matrix.mpi }}
          fail_ci_if_error: false

  # GPU (CUDA) coverage leg. Runs on the GPU-equipped self-hosted runner and
  # measures the host-side GPU dispatch code in the *_gpu translation units and
  # memory/device.cc (gcov is host-only, so CUDA __global__ kernels themselves
  # are not instrumented). There is no HIP coverage leg.
  coverage-gpu:
    runs-on: linux-x86-cuda
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcufft-dev", "libcublas-dev", "libcurand-dev"]'

      - name: Show GPU info
        run: |
          nvidia-smi
          nvcc --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libboost-test-dev

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy pytest pytest-cov gcovr \
            "NuMPI[test]" cupy-cuda12x muTimer

      - name: Configure (coverage-instrumented, CUDA, Debug)
        run: |
          source venv/bin/activate
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMUGRID_ENABLE_COVERAGE=ON \
            -DMUGRID_ENABLE_CUDA=ON \
            -DMUGRID_ENABLE_MPI=OFF \
            -DMUGRID_ENABLE_NETCDF=OFF \
            -DMUGRID_ENABLE_PYTHON=ON \
            -DMUGRID_ENABLE_TESTS=ON \
            -DMUGRID_ENABLE_EXAMPLES=OFF \
            -DCMAKE_CUDA_ARCHITECTURES="75" \
            -DPython_EXECUTABLE=$(which python3)

      - name: Build
        run: |
          source venv/bin/activate
          cmake --build build --parallel

      - name: Run test suite on GPU (populates coverage counters)
        run: |
          source venv/bin/activate
          ctest --test-dir build --output-on-failure

      # ctest hides a passing test's stdout, so the device test outcomes are not
      # otherwise visible. Re-run the Python tests with -v -rA so the log shows
      # exactly which GPU tests executed (vs. skipped) and their result. Failures
      # here surface as the device tests actually running.
      - name: Inspect Python test outcomes on GPU
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          export TESTS_BUILDDIR=$PWD/build/tests
          python3 -m pytest tests -v -rA -p no:cacheprovider

      - name: Generate C++ coverage reports
        run: |
          source venv/bin/activate
          cmake --build build --target coverage

      - name: Upload coverage reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-gpu
          path: |
            build/coverage.xml
            build/coverage_html/
          if-no-files-found: warn

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.xml
          flags: gpu
          fail_ci_if_error: false
