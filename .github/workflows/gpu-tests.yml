name: GPU Tests

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  gpu-tests:
    runs-on: linux-x86-cuda
    timeout-minutes: 60

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcufft-dev", "libcublas-dev", "libcurand-dev"]'

      - name: Show GPU info
        run: |
          echo "=== NVIDIA SMI ==="
          nvidia-smi
          echo ""
          echo "=== CUDA Toolkit ==="
          echo "Installed at: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
          nvcc --version

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libboost-test-dev

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy pytest "NuMPI[test]" cupy-cuda12x muTimer

      - name: Configure with CMake (CUDA enabled)
        run: |
          source venv/bin/activate
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMUGRID_ENABLE_CUDA=ON \
            -DMUGRID_ENABLE_PYTHON=ON \
            -DMUGRID_ENABLE_MPI=OFF \
            -DMUGRID_ENABLE_NETCDF=OFF \
            -DMUGRID_ENABLE_TESTS=ON \
            -DMUGRID_ENABLE_EXAMPLES=ON \
            -DCMAKE_CUDA_ARCHITECTURES="75" \
            -DPython_EXECUTABLE=$(which python3)

      - name: Build
        run: |
          source venv/bin/activate
          cmake --build build --parallel

      - name: Run C++ GPU tests
        run: |
          source venv/bin/activate
          cd build
          # Run all tests, GPU tests will actually execute on the Tesla T4
          ctest --output-on-failure -V

      - name: Run Python GPU tests
        run: |
          source venv/bin/activate
          # Install the built package
          python3 -m pip install .
          # Run GPU-specific Python tests
          cd tests
          python3 -m pytest python_field_gpu_tests.py -v -s
          python3 -m pytest python_fem_gradient_gpu_tests.py -v -s
          # Device-parameterized tests (run their [gpu] variants here)
          python3 -m pytest python_preconditioner_tests.py -v -s

      - name: Run Poisson example (host)
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          echo "=== Poisson 2D on HOST ==="
          python3 examples/poisson.py -n 32,32 -d cpu -k hardcoded -q
          echo ""
          echo "=== Poisson 3D on HOST ==="
          python3 examples/poisson.py -n 16,16,16 -d cpu -k hardcoded -q

      - name: Run Poisson example (device)
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          echo "=== Poisson 2D on DEVICE (GPU) ==="
          python3 examples/poisson.py -n 32,32 -d gpu -k hardcoded -q
          echo ""
          echo "=== Poisson 3D on DEVICE (GPU) ==="
          python3 examples/poisson.py -n 16,16,16 -d gpu -k hardcoded -q

      - name: Run Homogenization example (host)
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          echo "=== Homogenization 2D on HOST ==="
          python3 examples/homogenization.py -n 16,16 -d cpu -q
          echo ""
          echo "=== Homogenization 3D on HOST ==="
          python3 examples/homogenization.py -n 8,8,8 -d cpu -q

      - name: Run Homogenization example (device)
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          echo "=== Homogenization 2D on DEVICE (GPU) ==="
          python3 examples/homogenization.py -n 16,16 -d gpu -q
          echo ""
          echo "=== Homogenization 3D on DEVICE (GPU) ==="
          python3 examples/homogenization.py -n 8,8,8 -d gpu -q

  # GPU + MPI: builds the device communication paths (halo staging,
  # reduce_ghosts accumulation, FFT transpose staging) -- all guarded by
  # WITH_MPI and therefore NOT compiled by the MPI-off gpu-tests job above --
  # and runs the device-vs-host equivalence tests multi-rank, oversubscribing
  # the single GPU. This is the regression guard for the device communication
  # code (e.g. native-accumulation and async-staging work). The runner's stock
  # OpenMPI is not GPU-aware, so muGrid auto-detects that and exercises the
  # host-staging fallback; the direct-device path is covered on machines with
  # a GPU-aware MPI (where MUGRID_GPU_AWARE_MPI auto-detects true).
  gpu-mpi-tests:
    runs-on: linux-x86-cuda
    timeout-minutes: 60

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcufft-dev", "libcublas-dev", "libcurand-dev"]'

      - name: Show GPU info
        run: |
          nvidia-smi
          nvcc --version

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (incl. MPI)
        run: |
          sudo apt-get update -qy
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libboost-test-dev \
            openmpi-bin \
            libopenmpi-dev

      - name: Install Python dependencies (incl. mpi4py)
        run: |
          python3 -m venv venv
          source venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy pytest "NuMPI[test]" cupy-cuda12x muTimer
          CC=mpicc python3 -m pip install -v --no-binary mpi4py "mpi4py==4.0.3"

      - name: Configure with CMake (CUDA + MPI)
        run: |
          source venv/bin/activate
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMUGRID_ENABLE_CUDA=ON \
            -DMUGRID_ENABLE_MPI=ON \
            -DMUGRID_ENABLE_PYTHON=ON \
            -DMUGRID_ENABLE_NETCDF=OFF \
            -DMUGRID_ENABLE_TESTS=ON \
            -DCMAKE_CUDA_ARCHITECTURES="75" \
            -DPython_EXECUTABLE=$(which python3)

      - name: Build
        run: |
          source venv/bin/activate
          cmake --build build --parallel

      - name: Run device communication equivalence tests (multi-rank)
        run: |
          source venv/bin/activate
          export PYTHONPATH=$PWD/build/language_bindings/python:$PWD/language_bindings/python
          # Two ranks share the single GPU (oversubscribe). These tests
          # compare device results against the host/numpy reference and so
          # guard the device staging / accumulation / transpose code paths.
          mpiexec -n 2 --oversubscribe python3 -m pytest -v -s \
            tests/python_decomposition_tests.py \
            tests/python_mpi_fft_tests.py \
            tests/python_preconditioner_tests.py
