name: Documentation

# Build the MkDocs site and publish it to GitHub Pages on every push to main.
# Set Settings -> Pages -> Source to "GitHub Actions" once, for this to deploy.

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: python -m pip install --upgrade pip -r docs/requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Only the main branch publishes; pull requests just build-check above.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
